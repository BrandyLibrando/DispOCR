name: Package App
on:
 pull_request:
 push:
   branches:
     - master

# Cancel active CI runs for a PR before starting another run
concurrency:
 group: ${{ github.workflow}}-${{ github.ref }}
 cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
 FORCE_COLOR: "1"

defaults:
 run:
   shell: bash

jobs:
 ci:
   name: App Packaging
   runs-on: ${{ matrix.runs-on }}
   strategy:
     fail-fast: false
     matrix:
       target: [ "Ubuntu-24.04" ]
       include:
         - target: "Windows"
           output-format: "app"
           runs-on: "windows-latest"

         # - target: "macOS"
         #   output-format: "app"
         #   runs-on: "macos-latest"

         - target: "Ubuntu-24.04"
           platform: "Linux"
           output-format: "system"
           runs-on: "ubuntu-latest"
           pre-command: "sudo apt -y install socat"
           briefcase-run-prefix: "xvfb-run"
           briefcase-args: "--target ubuntu:24.04"

         # - target: "Fedora-40"
         #   platform: "Linux"
         #   output-format: "system"
         #   runs-on: "ubuntu-latest"
         #   pre-command: "sudo apt -y install socat"
         #   briefcase-run-prefix: "xvfb-run"
         #   briefcase-args: "--target fedora:40"

   steps:
     - name: Checkout
       uses: actions/checkout@v4

     - name: Setup Python
       uses: actions/setup-python@v4
       with:
         python-version: "3.10"

     - name: Install Briefcase
       run: |
         python -m pip install -U pip setuptools wheel
         python -m pip install briefcase

     - name: Build App
       run: |
         ${{ matrix.briefcase-build-prefix }} \
         briefcase build \
           ${{ matrix.platform || matrix.target }} \
           ${{ matrix.output-format }} \
           -u -r --log \
           ${{ matrix.briefcase-args }} \
           ${{ matrix.briefcase-build-args }}

     - name: Package App
       run: |
         ${{ matrix.briefcase-package-prefix }} \
         briefcase package \
           ${{ matrix.platform || matrix.target }} \
           ${{ matrix.output-format }} \
           --update --adhoc-sign --no-input --log \
           ${{ matrix.briefcase-args }} \
           ${{ matrix.briefcase-package-args }}
           
     - name: Install rclone (Linux)
       if: runner.os == 'Linux'
       run: |
          curl https://rclone.org/install.sh | sudo bash
     - name: Install rclone (Windows)
       if: runner.os == 'Windows'
       shell: pwsh
       run: |
          choco install rclone -y

     - name: Configure rclone
       shell: bash
       run: |
          mkdir -p ~/.config/rclone
          cat << 'EOF' > ~/.config/rclone/rclone.conf
          ${{ secrets.RCLONE_DLSU_DRIVE }}
          EOF

     - name: Get commit keyword
       shell: bash
       run: |
          COMMIT_VERSION=$(git log -1 --pretty=%s | awk '{print $1}' | tr '[:upper:]' '[:lower:]')
          echo "COMMIT_VERSION=$COMMIT_VERSION" >> $GITHUB_ENV
     
     - name: Check rclone config
       run: |
          ls -lah ~/.config/rclone
          rclone listremotes
    
     - name: Upload to Google Drive
       shell: bash
       run: |
          rclone copy dist/ \
             google_andeng:/ths_artifacts/${{ github.repository }}/${{ matrix.target }}/$COMMIT_VERSION \
            -v
